interface:
  display_name: "AFTER FAST FRB Processing"
  short_description: "Run AFTER from TOA-guided cutting to results and dashboard export."
  default_prompt: "Use $fast-frb-observation-processing as the AFTER protocol for one FAST FRB observation. Start from raw FITS, cut H5, calibrated H5, or already detected H5 as appropriate; use user-provided TOAs for raw cutting; pause for TOA and burst-label review only when needed; then run analysis, export burst_results.csv, and build the observation dashboard or summary."
